logging:
  file:
    enable: true
    level: INFO
    path: logs
    rotation: "10 MB"
    retention: "7 days"
  console:
    enable: true
    level: INFO

db_meta:
  host: localhost
  port: 3307
  user: ${oc.env:DB_META_USER,atguigu}
  password: ${oc.env:DB_META_PASSWORD,''}
  database: meta

db_dw:
  host: localhost
  port: 3307
  user: ${oc.env:DB_DW_USER,atguigu}
  password: ${oc.env:DB_DW_PASSWORD,''}
  database: dw

qdrant:
  host: localhost
  port: 6333
  embedding_size: 1024

embedding:
  host: localhost
  port: 8081
  model: BAAI/bge-large-zh-v1.5

es:
  host: localhost
  port: 9200
  index_name: dataquery_ai

llm:
  model_name: ${oc.env:LLM_MODEL,gpt-4.1}
  api_key: ${oc.env:LLM_API_KEY,demo-key}
  base_url: ${oc.env:LLM_BASE_URL,https://api.openai.com/v1}